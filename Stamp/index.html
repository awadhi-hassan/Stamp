<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Document - Mahare Coffee</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 480px; padding: 40px 30px; text-align: center; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        h1 { color: #1e293b; font-size: 24px; margin-bottom: 25px; font-weight: 700; }
        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 14px; color: #64748b; margin-bottom: 8px; font-weight: 600; }
        input[type="file"] { width: 100%; padding: 12px; border: 2px dashed #cbd5e1; border-radius: 8px; background: #f8fafc; cursor: pointer; transition: border-color 0.3s; }
        input[type="file"]:hover { border-color: #0284c7; }
        button { width: 100%; background-color: #0284c7; color: white; border: none; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: #0369a1; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .alert { margin-top: 15px; color: #ef4444; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <!-- Logo -->
    <img src="/static/Stamp.png" alt="Company Logo" class="logo" onerror="this.style.display='none'">
    
    <!-- Header -->
    <h1>Sign Document</h1>
    
    <!-- Form -->
    <form action="/stamp" method="POST" enctype="multipart/form-data" onsubmit="handleSubmit(event)">
        <div class="form-group">
            <label for="pdf_file">Select PDF File</label>
            <input type="file" id="pdf_file" name="pdf_file" accept=".pdf" required>
        </div>
        
        <button type="submit" id="submitBtn">Stamp Document</button>
    </form>
    
    <div id="errorMsg" class="alert">Please select a valid PDF file.</div>
</div>

<script>
    function handleSubmit(e) {
        const btn = document.getElementById('submitBtn');
        btn.innerText = 'Stamping PDF...';
        btn.disabled = true;
    }
</script>

</body>
</html>
